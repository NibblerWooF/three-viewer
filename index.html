<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BAJI Viewer (Control Panel)</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// 场景
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// 相机
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 5);

// 渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 控制器（鼠标拖动）
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// 灯光
const light1 = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 2);
light2.position.set(3, 5, 2);
scene.add(light2);

// 模型
let model;

// 加载
const loader = new GLTFLoader();
loader.load('./models/baji.glb', (gltf) => {
  model = gltf.scene;
  scene.add(model);

  // 自动居中
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
});

// ===== 控制面板 =====
const gui = new GUI();

const params = {
  rotationY: 0,
  rotationX: 0,
  posX: 0,
  posY: 0,
  posZ: 0,
  scale: 1,
  cameraZ: 5,
  cameraY: 1
};

// 模型控制
const modelFolder = gui.addFolder('模型控制');
modelFolder.add(params, 'rotationY', -Math.PI, Math.PI, 0.01);
modelFolder.add(params, 'rotationX', -Math.PI, Math.PI, 0.01);
modelFolder.add(params, 'posX', -5, 5, 0.01);
modelFolder.add(params, 'posY', -5, 5, 0.01);
modelFolder.add(params, 'posZ', -5, 5, 0.01);
modelFolder.add(params, 'scale', 0.1, 5, 0.01);

// 相机控制
const cameraFolder = gui.addFolder('相机控制');
cameraFolder.add(params, 'cameraZ', 1, 10, 0.01);
cameraFolder.add(params, 'cameraY', -5, 5, 0.01);

// 渲染循环
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y = params.rotationY;
    model.rotation.x = params.rotationX;
    model.position.set(params.posX, params.posY, params.posZ);
    model.scale.setScalar(params.scale);
  }

  camera.position.z = params.cameraZ;
  camera.position.y = params.cameraY;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// 自适应
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
