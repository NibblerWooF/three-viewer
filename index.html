<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>BAJI Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>

<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
  scene.add(hemiLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 2);
  dirLight.position.set(3, 5, 2);
  scene.add(dirLight);

  let model = null;

  const loader = new THREE.GLTFLoader();
  loader.load(
    './models/baji.glb',
    function (gltf) {
      model = gltf.scene;
      scene.add(model);

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
    },
    undefined,
    function (error) {
      console.error('GLB 加载失败：', error);
    }
  );

  const gui = new lil.GUI({ width: 320 });
  gui.domElement.style.transform = 'scale(1.25)';
  gui.domElement.style.transformOrigin = 'top right';
  gui.domElement.style.background = 'rgba(0,0,0,0.85)';

  const params = {
    rotationY: 0,
    rotationX: 0,
    posX: 0,
    posY: 0,
    posZ: 0,
    scale: 1,
    cameraZ: 5,
    cameraY: 1
  };

  const modelFolder = gui.addFolder('模型');
  modelFolder.add(params, 'rotationY', -Math.PI, Math.PI, 0.01);
  modelFolder.add(params, 'rotationX', -Math.PI, Math.PI, 0.01);
  modelFolder.add(params, 'posX', -5, 5, 0.01);
  modelFolder.add(params, 'posY', -5, 5, 0.01);
  modelFolder.add(params, 'posZ', -5, 5, 0.01);
  modelFolder.add(params, 'scale', 0.1, 5, 0.01);
  modelFolder.open();

  const cameraFolder = gui.addFolder('相机');
  cameraFolder.add(params, 'cameraZ', 1, 10, 0.01);
  cameraFolder.add(params, 'cameraY', -5, 5, 0.01);
  cameraFolder.open();

  function animate() {
    requestAnimationFrame(animate);

    if (model) {
      model.rotation.y = params.rotationY;
      model.rotation.x = params.rotationX;
      model.position.set(params.posX, params.posY, params.posZ);
      model.scale.setScalar(params.scale);
    }

    camera.position.z = params.cameraZ;
    camera.position.y = params.cameraY;

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
