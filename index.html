<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BAJI FINAL FIX</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>
<body>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<!-- 控制器 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<!-- GLTF -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<!-- GUI -->
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>

<script>
// ===== 场景 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// ===== 相机 =====
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 5);

// ===== 渲染 =====
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== 控制器 =====
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// ===== 灯光 =====
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(3, 5, 2);
scene.add(light);

// ===== 模型 =====
let model;

const loader = new THREE.GLTFLoader();
loader.load('./models/baji.glb', function(gltf) {
  model = gltf.scene;
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
});

// ===== GUI =====
const gui = new lil.GUI({ width: 300 });

gui.domElement.style.transform = 'scale(1.3)';
gui.domElement.style.transformOrigin = 'top right';
gui.domElement.style.background = 'rgba(0,0,0,0.8)';

// 参数
const params = {
  rotationY: 0,
  cameraZ: 5
};

gui.add(params, 'rotationY', -Math.PI, Math.PI);
gui.add(params, 'cameraZ', 1, 10);

// ===== 动画 =====
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y = params.rotationY;
  }

  camera.position.z = params.cameraZ;

  renderer.render(scene, camera);
}

animate();

// ===== 自适应 =====
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
