<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAJI Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #09111f;
      --bg-bottom: #010409;
      --panel-bg: rgba(6, 10, 18, 0.72);
      --panel-border: rgba(170, 220, 255, 0.18);
      --text-main: #eef6ff;
      --text-sub: #9cb2c9;
      --accent: #7ed0ff;
      --error: #ff7b7b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(70, 118, 181, 0.28), transparent 40%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text-main);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      max-width: min(420px, calc(100vw - 32px));
      padding: 14px 16px;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 48px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .hud-title {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hud-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-sub);
    }

    .hud-text strong {
      color: var(--accent);
    }

    .hud-text.error {
      color: var(--error);
    }
  </style>
</head>
<body>
  <div class="hud">
    <p class="hud-title">BAJI Viewer</p>
    <p id="statusText" class="hud-text">Loading model...</p>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>

  <script>
    const scene = new THREE.Scene();
    scene.background = null;

    const statusText = document.getElementById('statusText');
    const clock = new THREE.Clock();

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    setRendererColorSpace(renderer);
    document.body.appendChild(renderer.domElement);

    function setRendererColorSpace(targetRenderer) {
      if ('outputEncoding' in targetRenderer && THREE.sRGBEncoding) {
        targetRenderer.outputEncoding = THREE.sRGBEncoding;
      }
    }

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 1, 0);

    const hemiLight = new THREE.HemisphereLight(0xdff3ff, 0x182030, 1.4);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.4);
    dirLight.position.set(3, 5, 2);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambientLight);

    let modelRoot = null;
    let centeredRoot = null;
    let mixer = null;
    let activeAction = null;
    let animationClips = [];
    let clipsReady = false;

    const params = {
      modelPath: './models/baji.glb',
      rotationX: 0,
      rotationY: 0,
      rotationZ: 0,
      posX: 0,
      posY: 0,
      posZ: 0,
      scale: 1,
      autoRotate: false,
      autoRotateSpeed: 0.01,
      cameraX: 0,
      cameraY: 1.2,
      cameraZ: 5,
      lightIntensity: 2.4,
      hemiIntensity: 1.4,
      ambientIntensity: 0.45,
      animation: 'No animation',
      play: true,
      loop: true,
      speed: 1,
      resetModel: () => {
        params.rotationX = 0;
        params.rotationY = 0;
        params.rotationZ = 0;
        params.posX = 0;
        params.posY = 0;
        params.posZ = 0;
        params.scale = 1;
        params.autoRotate = false;
        syncDisplay(modelControllers);
      },
      resetCamera: () => {
        params.cameraX = 0;
        params.cameraY = 1.2;
        params.cameraZ = 5;
        controls.target.set(0, 1, 0);
        controls.update();
        syncDisplay(cameraControllers);
      }
    };

    const gui = new lil.GUI({ title: 'Control Panel', width: 340 });
    gui.domElement.style.marginTop = '10px';

    const modelFolder = gui.addFolder('Model');
    const modelControllers = [
      modelFolder.add(params, 'rotationX', -Math.PI, Math.PI, 0.01).name('Rotate X'),
      modelFolder.add(params, 'rotationY', -Math.PI, Math.PI, 0.01).name('Rotate Y'),
      modelFolder.add(params, 'rotationZ', -Math.PI, Math.PI, 0.01).name('Rotate Z'),
      modelFolder.add(params, 'posX', -5, 5, 0.01).name('Position X'),
      modelFolder.add(params, 'posY', -5, 5, 0.01).name('Position Y'),
      modelFolder.add(params, 'posZ', -5, 5, 0.01).name('Position Z'),
      modelFolder.add(params, 'scale', 0.1, 5, 0.01).name('Scale'),
      modelFolder.add(params, 'autoRotate').name('Auto Rotate'),
      modelFolder.add(params, 'autoRotateSpeed', -0.08, 0.08, 0.001).name('Rotate Speed')
    ];
    modelFolder.add(params, 'resetModel').name('Reset Model');
    modelFolder.open();

    const cameraFolder = gui.addFolder('Camera');
    const cameraControllers = [
      cameraFolder.add(params, 'cameraX', -10, 10, 0.01).name('Camera X'),
      cameraFolder.add(params, 'cameraY', -5, 10, 0.01).name('Camera Y'),
      cameraFolder.add(params, 'cameraZ', 1, 20, 0.01).name('Camera Z')
    ];
    cameraFolder.add(params, 'resetCamera').name('Reset Camera');
    cameraFolder.open();

    const lightFolder = gui.addFolder('Lights');
    lightFolder.add(params, 'lightIntensity', 0, 6, 0.01).name('Key Light');
    lightFolder.add(params, 'hemiIntensity', 0, 6, 0.01).name('Sky Light');
    lightFolder.add(params, 'ambientIntensity', 0, 3, 0.01).name('Ambient');

    const animationFolder = gui.addFolder('Animation');
    const animationStateController = animationFolder
      .add(params, 'animation', ['No animation'])
      .name('Clip')
      .onChange((clipName) => {
        if (!clipsReady) return;
        playClipByName(clipName);
      });
    animationFolder.add(params, 'play').name('Play').onChange(updatePlaybackState);
    animationFolder.add(params, 'loop').name('Loop').onChange(updatePlaybackState);
    animationFolder.add(params, 'speed', 0, 3, 0.01).name('Speed').onChange(updatePlaybackState);
    animationFolder.open();

    const loader = new THREE.GLTFLoader();
    loader.load(
      params.modelPath,
      (gltf) => {
        animationClips = gltf.animations || [];

        centeredRoot = new THREE.Group();
        modelRoot = gltf.scene;
        centeredRoot.add(modelRoot);
        scene.add(centeredRoot);

        centerModel(modelRoot);
        fitCameraToModel(modelRoot);
        buildAnimationControls(animationClips);

        statusText.textContent = animationClips.length
          ? `Model ready. Found ${animationClips.length} animation clip(s).`
          : 'Model ready. No animation clips found.';
      },
      (event) => {
        if (!event.total) return;
        const progress = ((event.loaded / event.total) * 100).toFixed(0);
        statusText.textContent = `Loading model... ${progress}%`;
      },
      (error) => {
        console.error('GLB load failed:', error);
        statusText.textContent = 'Model load failed. Check models/baji.glb.';
        statusText.classList.add('error');
      }
    );

    function centerModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      root.position.sub(center);
      root.position.y += size.y * 0.5;
      controls.target.set(0, size.y * 0.5, 0);
      controls.update();
    }

    function fitCameraToModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      params.cameraX = 0;
      params.cameraY = Math.max(0.8, size.y * 0.6);
      params.cameraZ = Math.max(3, maxDim * 2.2);
      syncDisplay(cameraControllers);
    }

    function buildAnimationControls(clips) {
      if (!clips.length || !modelRoot) {
        clipsReady = false;
        params.animation = 'No animation';
        animationStateController.options(['No animation']);
        animationStateController.updateDisplay();
        return;
      }

      mixer = new THREE.AnimationMixer(modelRoot);
      clipsReady = true;

      const clipNames = clips.map((clip, index) => clip.name || `Clip ${index + 1}`);
      params.animation = clipNames[0];
      animationStateController.options(clipNames);
      animationStateController.updateDisplay();
      playClipByName(params.animation);
    }

    function playClipByName(clipName) {
      if (!mixer || !animationClips.length) return;

      const clipIndex = animationClips.findIndex((clip, index) => {
        const currentName = clip.name || `Clip ${index + 1}`;
        return currentName === clipName;
      });

      if (clipIndex < 0) return;

      const clip = animationClips[clipIndex];
      const nextAction = mixer.clipAction(clip);

      if (activeAction && activeAction !== nextAction) {
        activeAction.fadeOut(0.2);
      }

      activeAction = nextAction;
      activeAction.reset();
      activeAction.fadeIn(0.2);
      updatePlaybackState();
      activeAction.play();
    }

    function updatePlaybackState() {
      if (!activeAction) return;
      activeAction.paused = !params.play;
      activeAction.setLoop(
        params.loop ? THREE.LoopRepeat : THREE.LoopOnce,
        params.loop ? Infinity : 1
      );
      activeAction.clampWhenFinished = !params.loop;
      activeAction.enabled = true;
      activeAction.timeScale = params.speed;
    }

    function syncDisplay(controllers) {
      controllers.forEach((controller) => controller.updateDisplay());
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (centeredRoot) {
        centeredRoot.rotation.x = params.rotationX;
        centeredRoot.rotation.y = params.rotationY;
        centeredRoot.rotation.z = params.rotationZ;

        if (params.autoRotate) {
          centeredRoot.rotation.y += params.autoRotateSpeed;
          params.rotationY = centeredRoot.rotation.y;
          modelControllers[1].updateDisplay();
        }

        centeredRoot.position.set(params.posX, params.posY, params.posZ);
        centeredRoot.scale.setScalar(params.scale);
      }

      camera.position.set(params.cameraX, params.cameraY, params.cameraZ);
      dirLight.intensity = params.lightIntensity;
      hemiLight.intensity = params.hemiIntensity;
      ambientLight.intensity = params.ambientIntensity;

      if (mixer && params.play) {
        mixer.update(delta);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
