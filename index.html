<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BAJI Viewer</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>

<!-- Three -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- GUI -->
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>

<script type="module">
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// ===== 场景 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// ===== 相机 =====
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 5);

// ===== 渲染 =====
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== 控制器 =====
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ===== 灯光 =====
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(3, 5, 2);
scene.add(dirLight);

// ===== 模型 =====
let model;

const loader = new GLTFLoader();
loader.load('./models/baji.glb', (gltf) => {
  model = gltf.scene;
  scene.add(model);

  // 自动居中
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
});

// ===== GUI（已放大+高对比）=====
const gui = new lil.GUI({
  width: 320
});

// 放大 UI
gui.domElement.style.transform = 'scale(1.3)';
gui.domElement.style.transformOrigin = 'top right';

// 提高可见性
gui.domElement.style.background = 'rgba(0,0,0,0.85)';
gui.domElement.style.border = '2px solid rgba(255,255,255,0.2)';

// ===== 参数 =====
const params = {
  rotationY: 0,
  rotationX: 0,
  posX: 0,
  posY: 0,
  posZ: 0,
  scale: 1,
  cameraZ: 5,
  cameraY: 1
};

// ===== 模型控制 =====
const modelFolder = gui.addFolder('模型');
modelFolder.add(params, 'rotationY', -Math.PI, Math.PI, 0.01);
modelFolder.add(params, 'rotationX', -Math.PI, Math.PI, 0.01);
modelFolder.add(params, 'posX', -5, 5, 0.01);
modelFolder.add(params, 'posY', -5, 5, 0.01);
modelFolder.add(params, 'posZ', -5, 5, 0.01);
modelFolder.add(params, 'scale', 0.1, 5, 0.01);

// ===== 相机控制 =====
const camFolder = gui.addFolder('相机');
camFolder.add(params, 'cameraZ', 1, 10, 0.01);
camFolder.add(params, 'cameraY', -5, 5, 0.01);

// ===== 动画循环 =====
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y = params.rotationY;
    model.rotation.x = params.rotationX;
    model.position.set(params.posX, params.posY, params.posZ);
    model.scale.setScalar(params.scale);
  }

  camera.position.z = params.cameraZ;
  camera.position.y = params.cameraY;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ===== 自适应 =====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
