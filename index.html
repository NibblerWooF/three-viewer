<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BAJI Viewer</title>

  <!-- 引入 model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<model-viewer
  src="./models/baji.glb"
  camera-controls
  auto-rotate
  exposure="1"
  shadow-intensity="1"
></model-viewer>

</body>
</html>
